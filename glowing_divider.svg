<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 6" width="800" height="6">
  <defs>
    <!-- Glow Filter -->
    <filter id="line-glow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Pulse Gradient -->
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.1" />
      <stop offset="35%" stop-color="#f43f5e" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#00d2ff" stop-opacity="0.9" />
      <stop offset="65%" stop-color="#f43f5e" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <style>
    .banner-bg {
      fill: none;
    }
    .divider-line {
      stroke: url(#div-grad);
      stroke-width: 1.5;
      filter: url(#line-glow);
      stroke-dasharray: 200 600;
      animation: pulse-flow 4s linear infinite;
    }

    @keyframes pulse-flow {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Animated Glowing Line -->
  <line x1="0" y1="3" x2="800" y2="3" class="divider-line" />
</svg>
