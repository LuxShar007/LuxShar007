<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="magenta-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fda4af" />
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    
    <style>
      .bg { fill: #03030c; }
      .text-title { fill: #e2e8f0; font-family: monospace; font-size: 11px; letter-spacing: 1px; font-weight: bold; }
      .text-base { fill: #cbd5e1; font-family: monospace; font-size: 10px; }
      .bar-bg { fill: #1e293b; rx: 3px; }
      
      @keyframes py-pulse {
        0%, 100% { width: 220px; }
        50% { width: 240px; }
      }
      @keyframes cpp-pulse {
        0%, 100% { width: 180px; }
        50% { width: 195px; }
      }
      @keyframes cuda-pulse {
        0%, 100% { width: 230px; }
        50% { width: 250px; }
      }
      @keyframes js-pulse {
        0%, 100% { width: 245px; }
        50% { width: 260px; }
      }
      
      .bar-py { animation: py-pulse 4s ease-in-out infinite; }
      .bar-cpp { animation: cpp-pulse 4.8s ease-in-out infinite; }
      .bar-cuda { animation: cuda-pulse 3.5s ease-in-out infinite; }
      .bar-js { animation: js-pulse 5.2s ease-in-out infinite; }
      
      @keyframes blink {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 0.2; }
      }
      .indicator { animation: blink 1.2s infinite; }
      
      @keyframes clock-drift {
        0%, 100% { content: "2.44 GHz"; }
        25% { content: "2.68 GHz"; }
        50% { content: "2.51 GHz"; }
        75% { content: "2.79 GHz"; }
      }
      .clock-dyn::after {
        content: "2.44 GHz";
        animation: clock-drift 3s step-end infinite;
      }
      
      @keyframes logs-scroll {
        0%, 100% { transform: translateY(0); }
        25% { transform: translateY(-16px); }
        50% { transform: translateY(-32px); }
        75% { transform: translateY(-48px); }
      }
      .log-group { animation: logs-scroll 9s step-end infinite; }
    </style>
  </defs>

  <!-- Panel Border & Background -->
  <rect x="2" y="2" width="796" height="236" rx="8" class="bg" stroke="#1e293b" stroke-width="1.5" />
  
  <path d="M 2 24 L 798 24" stroke="#1e293b" stroke-width="1.5" />
  <circle cx="15" cy="13" r="4" fill="#f43f5e" class="indicator" />
  <text x="30" y="16" class="text-title">LIVE PROCESSOR DIAGNOSTIC HUD // REALTIME METRICS</text>

  <!-- Left Column: Undulating Progress Bars -->
  <text x="30" y="55" class="text-title" fill="#a855f7">💾 CAPABILITY ALLOCATION BUFFERS</text>
  
  <!-- Python -->
  <text x="30" y="80" class="text-base">🐍 PYTHON CORE MEMORY:</text>
  <rect x="180" y="71" width="300" height="8" class="bar-bg" />
  <rect x="180" y="71" width="234" height="8" fill="url(#purple-grad)" rx="3" class="bar-py" />
  
  <!-- C++ -->
  <text x="30" y="115" class="text-base">💻 C++ VECTOR ARRAY:</text>
  <rect x="180" y="106" width="300" height="8" class="bar-bg" />
  <rect x="180" y="106" width="186" height="8" fill="url(#cyan-grad)" rx="3" class="bar-cpp" />

  <!-- CUDA -->
  <text x="30" y="150" class="text-base">⚡ CUDA GPU THREADS:</text>
  <rect x="180" y="141" width="300" height="8" class="bar-bg" />
  <rect x="180" y="141" width="246" height="8" fill="url(#magenta-grad)" rx="3" class="bar-cuda" />

  <!-- JS -->
  <text x="30" y="185" class="text-base">🌐 WEB FULLSTACK JS:</text>
  <rect x="180" y="176" width="300" height="8" class="bar-bg" />
  <rect x="180" y="176" width="255" height="8" fill="url(#amber-grad)" rx="3" class="bar-js" />

  <!-- Vertical Divider -->
  <path d="M 510 35 L 510 220" stroke="#1e293b" stroke-dasharray="4 4" stroke-width="1" />

  <!-- Right Column: Telemetry Readings -->
  <text x="535" y="55" class="text-title" fill="#00d2ff">📈 INSTANT TELEMETRY READS</text>
  
  <text x="535" y="85" class="text-base">💾 CORE GIT COMMITS:</text>
  <text x="700" y="85" class="text-base" fill="#00d2ff" font-weight="bold">197 COMMITS</text>
  
  <text x="535" y="115" class="text-base">⭐ REPOSITORY STARS:</text>
  <text x="700" y="115" class="text-base" fill="#fbbf24" font-weight="bold">6 STARS</text>

  <text x="535" y="145" class="text-base">📡 LOGIC PROCESSOR CLK:</text>
  <text x="700" y="145" class="text-base clock-dyn" fill="#f43f5e" font-weight="bold"></text>

  <!-- Live Terminal Logs Scroller -->
  <rect x="535" y="165" width="235" height="50" fill="#03030c" stroke="#1e293b" stroke-width="1" rx="4" />
  <g transform="translate(540, 180)" clip-path="url(#log-clip)">
    <clipPath id="log-clip">
      <rect x="0" y="-12" width="225" height="42" />
    </clipPath>
    <g class="log-group">
      <text x="0" y="0" class="text-base" fill="#10b981">> compiling kernels... SUCCESS</text>
      <text x="0" y="16" class="text-base" fill="#a855f7">> HtoD memory copy complete</text>
      <text x="0" y="32" class="text-base" fill="#fbbf24">> syncthreads matrix verified</text>
      <text x="0" y="48" class="text-base" fill="#10b981">> thread blocks idle.</text>
    </g>
  </g>
</svg>
