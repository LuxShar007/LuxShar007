  </g>

  <!-- Bottom Platform - Omega Label -->
  <text x="50" y="368" class="text-base">[ OBSERVATION PLATFORM OMEGA ] - 2ND BATTALION CLONE SOLDIERS</text>

  <!-- Status Divider Line -->
