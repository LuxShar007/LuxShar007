  <style>
    .terminal-bg {
      fill: #03030c;
      stroke: #1e293b;
      stroke-width: 2px;
    }
    .text-base {
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      fill: #94a3b8;
    }
    .text-title {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      fill: #64748b;
      font-weight: bold;
    }
    .text-highlight {
      fill: #e2e8f0;
      font-weight: bold;
    }
    .text-jedi {
      fill: #a855f7;
      font-weight: bold;
    }
    .text-vader {
      fill: #f43f5e;
      font-weight: bold;
    }
    .text-status {
      fill: #10b981;
      font-weight: bold;
    }

    /* 2-Frame Stormtrooper Animation */
    .t-frame1 {
      animation: toggleFrame1 0.8s steps(1) infinite;
    }
    .t-frame2 {
      animation: toggleFrame2 0.8s steps(1) infinite;
    }
    @keyframes toggleFrame1 {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes toggleFrame2 {
      0%, 49% { opacity: 0; }
      50%, 100% { opacity: 1; }
    }

    /* Troopers Platform Cheering Bobbing */
    @keyframes bob-alpha {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes bob-omega {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }
    .troopers-alpha {
      animation: bob-alpha 0.8s ease-in-out infinite;
      transform-origin: 400px 75px;
    }
    .troopers-omega {
      animation: bob-omega 0.8s ease-in-out infinite;
      transform-origin: 400px 325px;
    }

    /* Character Combat Vibrations */
    @keyframes vibrate-jedi {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-1px, 0.5px); }
      50% { transform: translate(1px, -0.5px); }
      75% { transform: translate(-0.5px, -1px); }
    }
    @keyframes vibrate-vader {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(1px, -0.5px); }
      50% { transform: translate(-1px, 0.5px); }
      75% { transform: translate(0.5px, 1px); }
    }
    .jedi-group {
      animation: vibrate-jedi 0.15s linear infinite;
    }
    .vader-group {
      animation: vibrate-vader 0.15s linear infinite;
    }

    /* Lightsaber Vibrations & Glows */
    .jedi-saber {
      animation: vibrate-jedi 0.1s linear infinite;
      filter: url(#purple-glow);
    }
    .vader-saber {
      animation: vibrate-vader 0.1s linear infinite;
      filter: url(#red-glow);
    }

    /* Clash Sparks Pulsing */
    @keyframes spark-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.35); opacity: 1; }
    }
    .clash-center {
      animation: spark-pulse 0.07s linear infinite;
      transform-origin: 395px 235px;
    }

    /* Glowing Labels */
    @keyframes pulse-purple {
      0%, 100% { fill: #a855f7; opacity: 0.8; }
      50% { fill: #d8b4fe; opacity: 1; }
    }
    @keyframes pulse-red {
      0%, 100% { fill: #f43f5e; opacity: 0.8; }
      50% { fill: #fca5a5; opacity: 1; }
    }
    .jedi-label {
      animation: pulse-purple 1s infinite alternate;
    }
    .vader-label {
      animation: pulse-red 1s infinite alternate;
    }
  </style>

  <!-- Terminal Window Background -->
