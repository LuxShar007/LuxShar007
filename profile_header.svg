<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <!-- Ultra-subtle Glow for Waves -->
    <filter id="clean-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Dot Matrix Pattern -->
    <pattern id="dot-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.75" fill="#334155" opacity="0.35" />
    </pattern>

    <!-- Glowing Wave Gradients -->
    <linearGradient id="wave-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.6" />
    </linearGradient>

    <linearGradient id="wave-magenta" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#fda4af" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.5" />
    </linearGradient>
  </defs>

  <style>
    .banner-bg {
      fill: #03030c;
    }
    .text-name {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 32px;
      font-weight: 700;
      fill: #ffffff;
      letter-spacing: -0.5px;
    }
    .text-tagline {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 400;
      fill: #f43f5e;
      letter-spacing: 0.5px;
    }
    .text-details {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 400;
      fill: #64748b;
      letter-spacing: 0.5px;
    }

    /* Minimalist Wave Scroll Animations */
    .wave-1 {
      stroke: url(#wave-purple);
      fill: none;
      stroke-width: 1.5;
      filter: url(#clean-glow);
      animation: scroll-right 12s linear infinite;
    }
    .wave-2 {
      stroke: url(#wave-magenta);
      fill: none;
      stroke-width: 1;
      filter: url(#clean-glow);
      animation: scroll-left 8s linear infinite;
    }

    @keyframes scroll-right {
      0% { transform: translateX(0); }
      100% { transform: translateX(400px); }
    }
    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-400px); }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="180" class="banner-bg" />

  <!-- Awwwards-style Dot Matrix Grid Overlay -->
  <rect width="800" height="180" fill="url(#dot-grid)" />

  <!-- Single Oscilloscope Wave Grid -->
  <g>
    <!-- Wave 1 (Rippling Forward) -->
    <path d="M -400 95 C -300 55, -100 135, 0 95 C 100 55, 300 135, 400 95 C 500 55, 700 135, 800 95 C 900 55, 1100 135, 1200 95" class="wave-1" />
    <!-- Wave 2 (Rippling Backward) -->
    <path d="M -400 85 C -300 125, -100 45, 0 85 C 100 125, 300 45, 400 85 C 500 125, 700 45, 800 85 C 900 125, 1100 45, 1200 85" class="wave-2" />
  </g>

  <!-- Typography Layout -->
  <text x="400" y="72" class="text-name" text-anchor="middle">Sharvin Sameer Mhatre</text>
  <text x="400" y="106" class="text-tagline" text-anchor="middle">Electronics &amp; Computer Science Engineer</text>
  <text x="400" y="132" class="text-details" text-anchor="middle">Founder of Axiom: The Kyber Collective</text>
</svg>
